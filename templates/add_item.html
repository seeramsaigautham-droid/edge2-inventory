{% extends "base.html" %}
{% block title %}Add Item{% endblock %}
{% block content %}

<div class="page-header" style="margin-bottom:24px;">
  <div class="breadcrumb"><a href="/dashboard">Dashboard</a> / <a href="/items">Items</a> / Add</div>
  <h1 class="page-title">Add Inventory Item</h1>
</div>

<div class="card" style="max-width:540px;">
  <div class="card-body">
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}
    <form method="POST">
       <input type="hidden" name="next" value="{{ request.args.get('next', '') }}"> 
      <div class="form-group">
        <label for="box_id">Box <span style="color:var(--danger)">*</span></label>
        <select id="box_id" name="box_id" required>
          <option value="">— Select a Box —</option>
          {% for box in boxes %}
          <option value="{{ box.id }}"
            {% if request.form.get('box_id') == box.id|string %}selected{% endif %}>
            {{ box.column_name }} › {{ box.box_name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="item_name">Item Name <span style="color:var(--danger)">*</span></label>
        <input type="text" id="item_name" name="item_name" placeholder="e.g. Arduino Uno"
          value="{{ request.form.get('item_name', '') }}" required>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label for="quantity">Initial Quantity <span style="color:var(--danger)">*</span></label>
          <input type="number" id="quantity" name="quantity" min="0"
            value="{{ request.form.get('quantity', '0') }}" required>
        </div>
        <div class="form-group">
          <label for="min_stock">Min Stock <span style="color:var(--danger)">*</span></label>
          <input type="number" id="min_stock" name="min_stock" min="0"
            value="{{ request.form.get('min_stock', '5') }}" required>
          <small style="color:var(--text-muted);">Alert threshold</small>
        </div>
      </div>
      <div class="form-group">
        <label for="description">Description <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input type="text" id="description" name="description"
          placeholder="e.g. ATmega328P based dev board"
          value="{{ request.form.get('description', '') }}">
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Save Item</button>
        <a href="/items" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
