{% extends "base.html" %}
{% block title %}Add User — Edge2{% endblock %}
{% block topbar_title %}Add New User{% endblock %}

{% block content %}

<div style="max-width:480px;">
  <div class="card">
    <div class="card-header">
      <span class="card-title">New User Account</span>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label>FULL NAME</label>
          <input type="text" name="name" placeholder="e.g. John Smith" required>
        </div>
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <input type="email" name="email" placeholder="john@edge2.com" required>
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" name="password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label>ROLE</label>
          <select name="role">
            <option value="employee">Employee</option>
            <option value="storekeeper">Store Keeper</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button type="submit" class="btn btn-primary">Create User</button>
          <a href="{{ url_for('users') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
