<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Edge2 Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c25;
      --surface2: #1e2330;
      --border: #2a303f;
      --border2: #323848;
      --text: #e8eaf0;
      --text-muted: #7b8199;
      --accent: #4f8ef7;
      --accent-hover: #6fa3ff;
      --accent-dim: #1a2d52;
      --danger: #f05a5a;
      --danger-dim: #3a1010;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(79,142,247,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-login:hover { background: var(--accent-hover); }

    .alert-error {
      background: var(--danger-dim);
      border: 1px solid #5a1a1a;
      color: var(--danger);
      padding: 11px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 500;
    }

    .demo-accounts {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }

    .demo-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .demo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
    }

    .demo-row:last-child { border-bottom: none; padding-bottom: 0; }

    .demo-email { color: var(--text); font-weight: 500; }
    .demo-pass { color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 11px; }

    .role-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tag-admin { background: rgba(79,142,247,0.15); color: var(--accent); }
    .tag-store { background: rgba(52,196,124,0.15); color: #34c47c; }
    .tag-emp   { background: rgba(245,166,35,0.15);  color: #f5a623; }

    .quick-login-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      color: var(--text-muted);
      text-align: left;
    }

    .quick-login-btn:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">E2</div>
    <div>
      <div style="font-size:17px;font-weight:700;">Edge 2 Systems</div>
      <div style="font-size:12px;color:var(--text-muted);">Inventory Management</div>
    </div>
  </div>

  <div class="login-card">
    <h1>Sign in</h1>
    <p class="subtitle">Access your inventory dashboard</p>

    {% if error %}
    <div class="alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" name="email" id="emailInput" placeholder="you@edge2.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" name="password" id="passInput" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="demo-accounts">
      <div class="demo-title">Demo Accounts</div>
      <div class="demo-row">
        <div>
          <span class="role-tag tag-admin">Admin</span>
          <button class="quick-login-btn" onclick="fillLogin('admin@edge2.com','admin123')"> admin@edge2.com</button>
        </div>
        <span class="demo-pass">admin123</span>
      </div>
      <div class="demo-row">
        <div>
          <span class="role-tag tag-store">Store</span>
          <button class="quick-login-btn" onclick="fillLogin('store@edge2.com','store123')"> store@edge2.com</button>
        </div>
        <span class="demo-pass">store123</span>
      </div>
      <div class="demo-row">
        <div>
          <span class="role-tag tag-emp">Employee</span>
          <button class="quick-login-btn" onclick="fillLogin('alice@edge2.com','alice123')"> alice@edge2.com</button>
        </div>
        <span class="demo-pass">alice123</span>
      </div>
    </div>
  </div>
</div>

<script>
  function fillLogin(email, pass) {
    document.getElementById('emailInput').value = email;
    document.getElementById('passInput').value = pass;
    document.querySelector('form').submit();
  }
</script>
</body>
</html>
