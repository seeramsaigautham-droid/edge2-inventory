{% extends "base.html" %}
{% block title %}Edit Column{% endblock %}
{% block content %}

<div class="page-header" style="margin-bottom:24px;">
  <div class="breadcrumb"><a href="/dashboard">Dashboard</a> / <a href="/columns">Columns</a> / Edit</div>
  <h1 class="page-title">Edit Column</h1>
</div>

<div class="card" style="max-width:480px;">
  <div class="card-body">
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label for="column_name">Column Name <span style="color:var(--danger)">*</span></label>
        <input type="text" id="column_name" name="column_name"
          value="{{ request.form.get('column_name', column.column_name) }}" required autofocus>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/columns" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
