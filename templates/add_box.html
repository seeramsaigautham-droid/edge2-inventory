{% extends "base.html" %}
{% block title %}Add Box{% endblock %}
{% block content %}

<div class="page-header" style="margin-bottom:24px;">
  <div class="breadcrumb"><a href="/dashboard">Dashboard</a> / <a href="/boxes">Boxes</a> / Add</div>
  <h1 class="page-title">Add Box</h1>
</div>

<div class="card" style="max-width:520px;">
  <div class="card-body">
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label for="column_id">Column <span style="color:var(--danger)">*</span></label>
        <select id="column_id" name="column_id" required>
          <option value="">— Select a Column —</option>
          {% for col in columns %}
          <option value="{{ col.id }}"
            {% if request.form.get('column_id') == col.id|string %}selected{% endif %}>
            {{ col.column_name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="box_name">Box Name <span style="color:var(--danger)">*</span></label>
        <input type="text" id="box_name" name="box_name" placeholder="e.g. Box 1"
          value="{{ request.form.get('box_name', '') }}" required>
      </div>
      <div class="form-group">
        <label for="description">Description <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input type="text" id="description" name="description" placeholder="e.g. Microcontrollers & Dev Boards"
          value="{{ request.form.get('description', '') }}">
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Save Box</button>
        <a href="/boxes" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
